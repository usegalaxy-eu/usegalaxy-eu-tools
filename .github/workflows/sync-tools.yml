name: Sync Tools

on:
  workflow_dispatch:
    inputs:
      force:
        description: 'Force sync even if an open PR already exists'
        type: boolean
        default: false
      catchup:
        description: 'Reset sync SHA to recover missed tools'
        type: boolean
        default: false

permissions: {}

jobs:
  get-targets:
    runs-on: ubuntu-latest
    outputs:
      targets: ${{ steps.set-matrix.outputs.targets }}
    steps:
      - name: Checkout repository
        uses: actions/checkout@v7.0.0
        with:
          persist-credentials: false

      - name: List sync targets from scripts/sync-targets.json
        id: set-matrix
        run: |
          targets=$(jq -c . scripts/sync-targets.json)
          if [ "$(echo "$targets" | jq 'length')" -eq 0 ]; then
            echo "::error::scripts/sync-targets.json is empty - nothing to sync"
            exit 1
          fi
          echo "targets=$targets" >> "$GITHUB_OUTPUT"

  sync:
    needs: get-targets
    runs-on: ubuntu-latest
    permissions:
      contents: write
      pull-requests: write
      models: read  # required by sync-tools-repo.py's models.github.ai category call
    strategy:
      fail-fast: false
      matrix:
        include: ${{ fromJson(needs.get-targets.outputs.targets) }}

    steps:
      - name: Check for existing sync PR
        id: check_pr
        uses: juliangruber/find-pull-request-action@v1.11.0
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}
          branch: sync-${{ matrix.name }}-tools
          state: open

      - name: Set run flag
        id: gate
        run: |
          if [[ -z "${STEPS_CHECK_PR_OUTPUTS_NUMBER}" || "${GITHUB_EVENT_INPUTS_FORCE}" == "true" ]]; then
            echo "should_run=true" >> $GITHUB_OUTPUT
          else
            echo "Skipping ${{ matrix.name }}: PR #${STEPS_CHECK_PR_OUTPUTS_NUMBER} already open."
            echo "should_run=false" >> $GITHUB_OUTPUT
          fi
        env:
          STEPS_CHECK_PR_OUTPUTS_NUMBER: ${{ steps.check_pr.outputs.number }}
          GITHUB_EVENT_INPUTS_FORCE: ${{ github.event.inputs.force }}

      - name: Checkout repository
        if: steps.gate.outputs.should_run == 'true'
        uses: actions/checkout@v7.0.0
        with:
          persist-credentials: false

      - name: Set up Python
        if: steps.gate.outputs.should_run == 'true'
        uses: actions/setup-python@v6.3.0
        with:
          python-version: '3.13'

      - name: Install uv
        if: steps.gate.outputs.should_run == 'true'
        uses: astral-sh/setup-uv@v8.2.0

      - name: Install dependencies
        if: steps.gate.outputs.should_run == 'true'
        run: uv pip install --system -r requirements.txt

      - name: Run sync script
        if: steps.gate.outputs.should_run == 'true'
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          NAME: ${{ matrix.name }}
          REPO: ${{ matrix.source_repo }}
          YAML: ${{ matrix.tools_yaml }}
          SYNC_REPORT_FILE: ${{ runner.temp }}/sync-report.md
          SYNC_CATCHUP: ${{ github.event.inputs.catchup == 'true' }}
        run: make sync

      - name: Check for changes
        if: steps.gate.outputs.should_run == 'true'
        id: check_changes
        uses: tj-actions/verify-changed-files@v20

      - name: Validate changed yaml (fast-fail)
        # Validate the synced yaml directly before opening the PR.
        # Not `make pr_check` (it diffs remotes/origin/master, which sees no uncommitted
        # working-tree changes) and not `make <file>.lint` (fix-lockfile.py would
        # regenerate the lockfile, which update-trusted/update is responsible for).
        if: steps.gate.outputs.should_run == 'true' && steps.check_changes.outputs.files_changed == 'true'
        run: |
          pykwalify -d "${{ matrix.tools_yaml }}" -s .schema.yaml
          python scripts/pr-check.py "${{ matrix.tools_yaml }}"

      - name: Create or update Pull Request
        if: steps.gate.outputs.should_run == 'true' && steps.check_changes.outputs.files_changed == 'true'
        uses: peter-evans/create-pull-request@v8.1.1
        with:
          branch: sync-${{ matrix.name }}-tools
          commit-message: Add new tools from ${{ matrix.source_repo }} repository
          title: Add new tools from ${{ matrix.source_repo }} repository
          body-path: ${{ runner.temp }}/sync-report.md
          delete-branch: true
          add-paths: |
            ${{ matrix.tools_yaml }}
            scripts/.last-${{ matrix.name }}-sync-sha
