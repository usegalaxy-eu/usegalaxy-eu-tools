name: Weekly Tools Update (Sync, Update, Deprecate)

# Combines the three tool-maintenance steps into a single, ordered pipeline
# so that new tools are added before new revisions, and outdated revisions
# are removed last - all before the Sunday installs on usegalaxy.eu.
#
# The individual sync-tools.yml / update-trusted.yml / fix-outdated-tools.yml
# workflows remain available for manual (workflow_dispatch) runs, but their
# schedules were removed in favor of this combined workflow to avoid
# duplicate/conflicting runs.

on:
  workflow_dispatch:
  schedule:
    - cron: '0 6 * * 5'  # Every Friday 06:00 UTC

permissions: {}

concurrency:
  group: ${{ github.workflow }}
  cancel-in-progress: false

jobs:
  get-targets:
    runs-on: ubuntu-latest
    outputs:
      targets: ${{ steps.set-matrix.outputs.targets }}
    steps:
      - name: Checkout repository
        uses: actions/checkout@v7.0.0
        with:
          persist-credentials: false

      - name: List sync targets from scripts/sync-targets.json
        id: set-matrix
        run: |
          targets=$(jq -c . scripts/sync-targets.json)
          if [ "$(echo "$targets" | jq 'length')" -eq 0 ]; then
            echo "::error::scripts/sync-targets.json is empty - nothing to sync"
            exit 1
          fi
          echo "targets=$targets" >> "$GITHUB_OUTPUT"

  sync:
    needs: get-targets
    runs-on: ubuntu-latest
    permissions:
      contents: read
      models: read  # required by sync-tools-repo.py's models.github.ai category call
    strategy:
      fail-fast: false
      matrix:
        include: ${{ fromJson(needs.get-targets.outputs.targets) }}

    steps:
      # No open-PR gate here, unlike sync-tools.yml: this job only uploads artifacts
      # for the combined PR assembled below, and peter-evans/create-pull-request
      # updates an existing open weekly-tools-update PR in place rather than making a
      # duplicate. Re-running with a PR still open just folds in the latest tools.
      - name: Checkout repository
        uses: actions/checkout@v7.0.0
        with:
          persist-credentials: false

      - name: Set up Python
        uses: actions/setup-python@v6.3.0
        with:
          python-version: '3.13'

      - name: Install uv
        uses: astral-sh/setup-uv@v8.2.0
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}
          cache-suffix: ${{ matrix.name }}

      - name: Install dependencies
        run: uv pip install --system -r requirements.txt

      - name: Run sync script
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          NAME: ${{ matrix.name }}
          REPO: ${{ matrix.source_repo }}
          YAML: ${{ matrix.tools_yaml }}
          # Write the report into the workspace (not $RUNNER_TEMP) so that the upload
          # below mixes only workspace-relative paths. Mixing a workspace path with an
          # absolute $RUNNER_TEMP path makes upload-artifact's least-common-ancestor the
          # high work-dir parent, preserving directory structure on download and landing
          # the files in nested/_temp paths instead of the workspace root. The report is
          # never committed: create-pull-request's add-paths lists only yaml/lock/sha
          # patterns, so sync-report-*.md is ignored by the PR step.
          SYNC_REPORT_FILE: sync-report-${{ matrix.name }}.md
        run: make sync

      - name: Check for changes
        id: check_changes
        uses: tj-actions/verify-changed-files@v20

      - name: Validate changed yaml (fast-fail)
        # Validate the synced yaml directly before uploading it as an artifact.
        # Not `make pr_check` (it diffs remotes/origin/master, which sees no uncommitted
        # working-tree changes) and not `make <file>.lint` (fix-lockfile.py would
        # regenerate the lockfile, which update-deprecate is responsible for).
        if: steps.check_changes.outputs.files_changed == 'true'
        run: |
          pykwalify -d "${{ matrix.tools_yaml }}" -s .schema.yaml
          python scripts/pr-check.py "${{ matrix.tools_yaml }}"

      - name: Upload sync changes
        if: steps.check_changes.outputs.files_changed == 'true'
        uses: actions/upload-artifact@v7.0.1
        with:
          name: sync-changes-${{ matrix.name }}
          path: |
            ${{ matrix.tools_yaml }}
            scripts/.last-${{ matrix.name }}-sync-sha
            sync-report-${{ matrix.name }}.md

  update-deprecate:
    needs: [get-targets, sync]
    # Run after sync whether its legs succeeded or failed (a failed leg must not abort
    # the whole pipeline - download-artifact just finds no artifact for it), but skip
    # when the run was cancelled or when get-targets itself failed (no targets -> no
    # point assembling a PR). `always()` alone would also run after a get-targets
    # failure; gating on its result avoids that.
    if: ${{ !cancelled() && needs.get-targets.result == 'success' }}
    runs-on: ubuntu-latest
    permissions:
      contents: write
      pull-requests: write
    env:
      GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
    steps:
      - name: Checkout repository
        uses: actions/checkout@v7.0.0
        with:
          fetch-depth: 0
          persist-credentials: false

      - name: Set up Python
        uses: actions/setup-python@v6.3.0
        with:
          python-version: '3.13'

      - name: Install uv
        uses: astral-sh/setup-uv@v8.2.0
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}

      - name: Install dependencies
        run: uv pip install --system -r requirements.txt

      - name: Download all sync artifacts
        uses: actions/download-artifact@v8.0.1
        with:
          pattern: sync-changes-*
          merge-multiple: true

      - name: 2. Add new revisions to trusted tools
        run: make update

      - name: 3. Remove not-installable (deprecated) revisions
        id: deprecate
        # Run fix_outdated.py per lockfile, capturing each exit code so a failing
        # lockfile is identified deterministically (by its exit code, not by parsing
        # make's prose stderr - which would break if make changes its error format).
        # Parallelism is capped at 4 to match the old fix-outdated-tools.yml's
        # max-parallel: 4 (fix_outdated.py already runs a ThreadPoolExecutor(3) per
        # lockfile, so 4 * 3 = 12 concurrent toolshed calls, the same ceiling as
        # before). A failed lockfile never blocks the others or discards the
        # sync/update work already done.
        continue-on-error: true
        run: |
          mkdir -p "$RUNNER_TEMP/deprecate-logs"
          : > "$RUNNER_TEMP/deprecate-failed.txt"
          : > "$RUNNER_TEMP/deprecate-ok.txt"

          running=0
          for lockfile in *.yaml.lock; do
            (
              log="$RUNNER_TEMP/deprecate-logs/${lockfile}.log"
              if python3 scripts/fix_outdated.py "$lockfile" >"$log" 2>&1; then
                echo "$lockfile" >> "$RUNNER_TEMP/deprecate-ok.txt"
              else
                echo "$lockfile" >> "$RUNNER_TEMP/deprecate-failed.txt"
              fi
            ) &
            running=$((running + 1))
            if [ "$running" -ge 4 ]; then
              # wait -n returns the failed job's exit code if one died; ignore it -
              # the failure is already recorded in deprecate-failed.txt by the subshell.
              wait -n || true
              running=$((running - 1))
            fi
          done
          # Wait for all remaining jobs. A non-zero exit here would mark the step
          # failed even though each failure was already captured above; || true keeps
          # the step green and lets had_errors drive the warning/PR-body instead.
          wait || true

          if [ -s "$RUNNER_TEMP/deprecate-failed.txt" ]; then
            echo "had_errors=true" >> "$GITHUB_OUTPUT"
            echo "::warning::fix_outdated.py failed for these lockfiles: $(tr '\n' ' ' < "$RUNNER_TEMP/deprecate-failed.txt")"
            # Surface each failure's log in a collapsible group for diagnosis.
            while IFS= read -r f; do
              echo "::group::deprecate log: $f"
              cat "$RUNNER_TEMP/deprecate-logs/${f}.log"
              echo "::endgroup::"
            done < "$RUNNER_TEMP/deprecate-failed.txt"
          else
            echo "had_errors=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Build deprecate report
        if: steps.deprecate.outputs.had_errors == 'true'
        run: |
          {
            echo "## :warning: Deprecate failures"
            echo ""
            echo "The following lockfiles failed during deprecation and were skipped:"
            echo ""
            while IFS= read -r f; do
              echo "- \`$f\`"
            done < "$RUNNER_TEMP/deprecate-failed.txt"
            echo ""
            echo "Per-lockfile logs are in the \"deprecate log\" groups of the" \
              "\`Remove not-installable (deprecated) revisions\` step in the workflow run."
          } > "$RUNNER_TEMP/deprecate-report.md"

      - name: Validate changed yaml files
        run: make pr_check

      - name: Check for changes
        id: check_changes
        run: |
          if [[ -n $(git status --porcelain -- '*.yaml' '*.yaml.lock' 'not-installable-revisions/*.yaml' 'scripts/.last-*-sync-sha') ]]; then
            echo "changes=true" >> "$GITHUB_OUTPUT"
          else
            echo "changes=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Build PR body
        if: steps.check_changes.outputs.changes == 'true'
        run: |
          {
            echo "This PR was automatically generated by the \`weekly-tools-update\` workflow."
            echo ""
            echo "It runs three steps in order, so that new tools are added before new"
            echo "revisions, and outdated revisions are removed last:"
            echo "1. **Sync** - add new tools from \`galaxyproject/tools-iuc\` and \`bgruening/galaxytools\`"
            echo "2. **Update** - add new installable revisions for trusted tool owners"
            echo "3. **Deprecate** - remove revisions that are no longer installable"
            echo ""
            echo "## Sync reports"
            echo ""
            if ls sync-report-*.md >/dev/null 2>&1; then
              for f in sync-report-*.md; do
                echo "### $f"
                echo ""
                cat "$f"
                echo ""
              done
            else
              echo "_No sync reports (no new tools this run, or sync was skipped)._"
              echo ""
            fi
            echo ""
            echo "## Deprecate status"
            echo ""
            if [ -f "$RUNNER_TEMP/deprecate-report.md" ]; then
              cat "$RUNNER_TEMP/deprecate-report.md"
            else
              echo "All lockfiles deprecated successfully."
            fi
            echo ""
            echo "Workflow run: [${{ github.run_id }}](${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }})"
          } > "$RUNNER_TEMP/pr-body.md"

      - name: Create or update Pull Request
        if: steps.check_changes.outputs.changes == 'true'
        uses: peter-evans/create-pull-request@v8.1.1
        with:
          branch: weekly-tools-update
          commit-message: "Weekly tools update: sync new tools, add revisions, remove deprecated"
          title: 'Weekly tools update: sync, update, deprecate'
          body-path: ${{ runner.temp }}/pr-body.md
          delete-branch: true
          add-paths: |
            *.yaml
            *.yaml.lock
            not-installable-revisions/*.yaml
            scripts/.last-*-sync-sha
